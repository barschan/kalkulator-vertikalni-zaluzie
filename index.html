// Pořadí přesně dle ceníku, sdílení ceny = sdílení sloupce

function getPM2(fabric, type, h) {
  const bi = BANDS.findIndex(b=>h>=b.min&&h<=b.max);
  if (bi<0) return null;
  return (type==='std' ? fabric.std : fabric.lux)[bi] ?? null;
}

  {label:'Sharon', fabrics:['Sharon']},
];

function buildFabricSelect(selId, onchangeStr) {
  const opts = CENIK_COLS.map(col => {
    const items = col.fabrics.map(name => {
      const fi = FABRICS.findIndex(f=>f.name===name);
      if (fi<0) return '';
      const f = FABRICS[fi];
      const tags = (f.b89?' ✕89mm':'') + (f.fire?' 🔥':'');
      return `<option value="${fi}">${name}${tags}</option>`;
    }).join('');
    if (col.fabrics.length === 1) {
      // samostatná látka — bez optgroup
      return items;
    }
    return `<optgroup label="── ${col.label} ──">${items}</optgroup>`;
  }).join('');
  return `<select id="${selId}" onchange="${onchangeStr}">
    <option value="">– vyberte látku –</option>
    ${opts}
  </select>
  <div class="warn-hint" id="${selId}_warn"></div>`;
}

function fabricWarn(selId) {
  const fi = parseInt(document.getElementById(selId)?.value);
  const f = FABRICS[fi];
  const is89 = document.getElementById('p89').checked;
  const w = document.getElementById(selId+'_warn');
  if (w) {
    if (f && is89 && f.b89) { w.textContent='⛔ '+f.name+' nelze v provedení 89 mm'; w.style.display='block'; }
    else { w.textContent=''; w.style.display='none'; }
  }
}

  fabricWarn('rfab_'+id); fabricWarn('cfab_'+id);

function delRow(id){
  document.getElementById('trow_'+id)?.remove();

}

function renumber(){
  document.querySelectorAll('#tbody tr').forEach((tr,i)=>{
    const n=tr.querySelector('.td-n'); if(n) n.textContent=i+1;
  });
  document.querySelectorAll('.icard').forEach((c,i)=>{
    const n=c.querySelector('.icard-num'); if(n) n.textContent=i+1;
  });
}

// CALCULATION
// ═══════════════════════════════════════════════════════════
function fmt(n){return n.toLocaleString('cs-CZ')+' Kč'}
function ceilKc(v){return Math.ceil(v)}

function recalc(){
  let totZ=0, totKs=0;
  document.querySelectorAll('#tbody tr').forEach(tr=>{
    const id=parseInt(tr.id.replace('trow_',''));
    const type=(document.getElementById('rtype_'+id)||{}).value||'';
    const fi=parseInt((document.getElementById('rfab_'+id)||{}).value);
    const w=parseInt((document.getElementById('rw_'+id)||{}).value)||0;
    const h=parseInt((document.getElementById('rh_'+id)||{}).value)||0;
    const qty=parseInt((document.getElementById('rqty_'+id)||{}).value)||1;
    const f=FABRICS[fi];

    const pe=document.getElementById('rprice_'+id);
    const te=document.getElementById('rtot_'+id);
    const cp=document.getElementById('cprice_'+id);
    const ct=document.getElementById('ctot_'+id);

    if(type&&f&&w>0&&h>0){
      const pm2=getPM2(f,type,h);
      if(pm2!==null){
        const area=(w/1000)*(h/1000);
        const pks=ceilKc(area*pm2);
        const rowT=ceilKc(pks*qty);
        const ps=pks.toLocaleString('cs-CZ')+' Kč';
        const ts=rowT.toLocaleString('cs-CZ')+' Kč';
        if(pe) pe.value=ps; if(te) te.value=ts;
        if(cp) cp.textContent=ps; if(ct) ct.textContent=ts;
        totZ+=rowT; totKs+=qty;
      } else {
        ['rprice_','rtot_'].forEach(p=>{const e=document.getElementById(p+id);if(e)e.value='?'});
        if(cp) cp.textContent='?'; if(ct) ct.textContent='?';
      }
    } else {
      ['rprice_','rtot_'].forEach(p=>{const e=document.getElementById(p+id);if(e)e.value='—'});
      if(cp) cp.textContent='—'; if(ct) ct.textContent='—';
    }
    fabricWarn('rfab_'+id);
    fabricWarn('cfab_'+id);
  });

  // Příplatky
  const is89=document.getElementById('p89').checked;
  const p89v=is89?ceilKc(totZ*0.20):0;
  const pKv=document.getElementById('pKonz').checked?totKs*36:0;
  const pBv=document.getElementById('pBez').checked?totKs*15:0;
  const pSv=document.getElementById('pSik').checked?(parseInt(document.getElementById('sikKc').value)||0):0;
  document.getElementById('v89').textContent=fmt(p89v);
  document.getElementById('vKonz').textContent=fmt(pKv);
  document.getElementById('vBez').textContent=fmt(pBv);
  document.getElementById('vSik').textContent=fmt(pSv);
  const totP=p89v+pKv+pBv+pSv;

  // Montáž
  const mKs=parseInt(document.getElementById('monKs').value)||0;
  const mTot=mKs*totKs;
  document.getElementById('monN').textContent=totKs;
  document.getElementById('monTot').textContent=fmt(mTot);

  // Sleva — z žaluzie + montáž (ne příplatky)
  const slevaR=parseFloat(document.getElementById('sleva').value)||0;
  const slevaB=totZ+mTot;
  const slevaV=ceilKc(slevaB*slevaR/100);
  document.getElementById('discPct').textContent=Number.isInteger(slevaR)?slevaR:slevaR.toFixed(1);
  document.getElementById('sSleva').textContent='− '+fmt(slevaV);
  document.getElementById('discRow').style.display=slevaR>0?'':'none';

  // Doprava
  const dopSel=document.getElementById('dop').value;
  document.getElementById('dopCW').style.display=dopSel==='custom'?'block':'none';
  const dopV=dopSel==='custom'?(parseInt(document.getElementById('dopC').value)||0):(parseInt(dopSel)||0);

  const celk=totZ+totP+mTot-slevaV+dopV;
  document.getElementById('sZal').textContent=fmt(totZ);
  document.getElementById('sPrip').textContent=fmt(totP);
  document.getElementById('sMon').textContent=fmt(mTot);
  document.getElementById('sDop').textContent=dopV===0?'zdarma':fmt(dopV);
  document.getElementById('sCelk').textContent=fmt(celk);
}

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
function getState(){
  const rows=[];
  document.querySelectorAll('#tbody tr').forEach(tr=>{
    const id=parseInt(tr.id.replace('trow_',''));
    rows.push({
      room:(document.getElementById('rroom_'+id)||{}).value||'',
      type:(document.getElementById('rtype_'+id)||{}).value||'',
      fi:(document.getElementById('rfab_'+id)||{}).value||'',
      w:(document.getElementById('rw_'+id)||{}).value||'',
      h:(document.getElementById('rh_'+id)||{}).value||'',
      qty:(document.getElementById('rqty_'+id)||{}).value||1,
    });
  });
  return {
    hdr:{name:document.getElementById('f_name').value,order:document.getElementById('f_order').value,
         date:document.getElementById('f_date').value,phone:document.getElementById('f_phone').value,
         address:document.getElementById('f_address').value,note:document.getElementById('f_note').value},
    rows,
    sur:{p89:document.getElementById('p89').checked,pKonz:document.getElementById('pKonz').checked,
         pBez:document.getElementById('pBez').checked,pSik:document.getElementById('pSik').checked,
         sikKc:document.getElementById('sikKc').value},
    sum:{monKs:document.getElementById('monKs').value,dop:document.getElementById('dop').value,
         dopC:document.getElementById('dopC').value,sleva:document.getElementById('sleva').value}
  };
}

function loadState(st){
  const h=st.hdr||{};
  ['name','order','date','phone','address','note'].forEach(k=>{
    const e=document.getElementById('f_'+k); if(e) e.value=h[k]||'';
  });
  document.getElementById('tbody').innerHTML='';
  document.getElementById('icards').innerHTML='';
  rowId=0;
  (st.rows||[]).forEach(r=>{
    addRow(); const id=rowId;
    const sv=(elId,val)=>{const e=document.getElementById(elId);if(e)e.value=val;};
    sv('rroom_'+id,r.room||''); sv('rtype_'+id,r.type||'');
    sv('rw_'+id,r.w||''); sv('rh_'+id,r.h||''); sv('rqty_'+id,r.qty||1);
    sv('croom_'+id,r.room||''); sv('ctype_'+id,r.type||'');
    sv('cw_'+id,r.w||''); sv('ch_'+id,r.h||''); sv('cqty_'+id,r.qty||1);
    if(r.fi!==''&&r.fi!==undefined){
      sv('rfab_'+id,r.fi); sv('cfab_'+id,r.fi);
    }
  });
  const s=st.sur||{};
  document.getElementById('p89').checked=!!s.p89;
  document.getElementById('pKonz').checked=!!s.pKonz;
  document.getElementById('pBez').checked=!!s.pBez;
  document.getElementById('pSik').checked=!!s.pSik;
  document.getElementById('sikKc').value=s.sikKc||0;
  const sm=st.sum||{};
  document.getElementById('monKs').value=sm.monKs??250;
  document.getElementById('dop').value=sm.dop||'0';
  document.getElementById('dopC').value=sm.dopC||0;
  document.getElementById('sleva').value=sm.sleva||0;
  recalc();
}

// ═══════════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════════
function saveOrder(){
  const st=getState(),name=(st.hdr.name||'Zákazník').trim(),date=new Date().toLocaleDateString('cs-CZ'),key='vz_'+name+'_'+Date.now();
  st._m={key,name,date}; localStorage.setItem(key,JSON.stringify(st));
  showSt('Zakázka „'+name+'" uložena ('+date+').','ok'); renderSaved();
}
function loadOrder(key){const raw=localStorage.getItem(key);if(!raw)return;loadState(JSON.parse(raw));document.getElementById('savedWrap').style.display='none';showSt('Zakázka načtena.','ok');}
function deleteOrder(key){localStorage.removeItem(key);renderSaved();}
function toggleSaved(){const w=document.getElementById('savedWrap');const v=w.style.display!=='none';w.style.display=v?'none':'block';if(!v)renderSaved();}
function renderSaved(){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('vz_'));
  const list=document.getElementById('savedList');
  if(!keys.length){list.innerHTML='<div style="padding:12px;font-size:12.5px;color:var(--muted)">Žádné uložené zakázky.</div>';return;}
  list.innerHTML=keys.sort().reverse().map(k=>{
    let m={};try{m=JSON.parse(localStorage.getItem(k))._m||{};}catch{}
    return `<div class="saved-item"><div><div style="font-size:13px">${m.name||k}</div><div style="font-size:11px;color:var(--muted)">${m.date||''}</div></div>
    <div style="display:flex;gap:6px;margin-left:auto"><button class="btn bg_ bsm" onclick="loadOrder('${k}')">Načíst</button><button class="btn br bsm" onclick="deleteOrder('${k}');renderSaved()">Smazat</button></div></div>`;
  }).join('');
}
function exportJSON(){
  const st=getState(),name=(st.hdr.name||'zakázka').replace(/\s+/g,'_');
  const blob=new Blob([JSON.stringify(st,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='VZ_'+name+'_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(url);
}
function importJSON(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{try{loadState(JSON.parse(e.target.result));showSt('Soubor importován.','ok');}catch{showSt('Chyba: neplatný JSON.','err');}};
  r.readAsText(f);ev.target.value='';
}
function clearAll(){
  if(!confirm('Opravdu smazat zakázku?'))return;
  document.getElementById('tbody').innerHTML='';
  document.getElementById('icards').innerHTML='';
  rowId=0;
  ['f_name','f_order','f_phone','f_address','f_note'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  document.getElementById('f_date').value=new Date().toISOString().slice(0,10);
  ['p89','pKonz','pBez','pSik'].forEach(id=>document.getElementById(id).checked=false);
  document.getElementById('sikKc').value=0;document.getElementById('monKs').value=250;
  document.getElementById('dop').value='0';document.getElementById('dopC').value=0;document.getElementById('sleva').value=0;
  recalc();
}
function showSt(msg,type){
  const el=document.getElementById('statusMsg');el.textContent=msg;el.className='status '+type;
  clearTimeout(el._t);el._t=setTimeout(()=>{el.className='status';},4500);
}

// INIT
document.getElementById('f_date').value=new Date().toISOString().slice(0,10);
addRow();
</script>
